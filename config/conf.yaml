# =============================================================================
# UCL Institute of Finance & Technology
# IFTE0003: Big Data in Quantitative Finance
# Coursework 1 – Pipeline Configuration
# =============================================================================

dev:
  config:
    env_variables:
      - MINIO_USER
      - MINIO_PASSWORD
      - MINIO_URL
      - POSTGRES_USERNAME
      - POSTGRES_PASSWORD
      - POSTGRES_HOST_DEV
      - POSTGRES_PORT_DEV
      - POSTGRES_DATABASE
      - MONGO_HOST
      - MONGO_PORT
      - MONGO_USERNAME
      - MONGO_PASSWORD
      - KAFKA_BOOTSTRAP_SERVERS
    Database:
      Postgres:
        Host: localhost
        Database: fift
        Username: postgres
        Password: postgres
        Port: 5438
        Schema: systematic_equity
      Minio:
        BucketName: iftbigdata
        RawDataPath: raw-data
      MongoDB:
        Host: localhost
        Port: 27017
        Database: ift_cw1
        Username: ift_bigdata
        Password: mongo_password
      Kafka:
        BootstrapServers: localhost:9092
  params:
    Pipeline:
      lookback_years: 6
      api_delay_seconds: 0.5
      max_retries: 3
      backoff_base: 2.0
      batch_size: 50
    DataSources:
      prices:
        enabled: true
        priority: P0
      fundamentals:
        enabled: true
        priority: P1
      fx:
        enabled: true
        priority: P0
        pairs:
          - "GBPUSD=X"
          - "EURUSD=X"
          - "CADUSD=X"
          - "CHFUSD=X"
      vix:
        enabled: true
        priority: P0
        ticker: "^VIX"
      risk_free_rate:
        enabled: true
        priority: P2
        series_id: "DGS3MO"
      benchmark:
        enabled: true
        priority: P1
        symbols:
          - "^GSPC"
      ratios:
        enabled: true
        priority: P1
      esg:
        enabled: true
        priority: P2
    CurrencyMapping:
      ".L": GBP
      ".PA": EUR
      ".AS": EUR
      ".DE": EUR
      ".MC": EUR
      ".MI": EUR
      ".TO": CAD
      ".S": CHF
      default: USD
    SwissTickerRemap:
      from_suffix: ".S"
      to_suffix: ".SW"

